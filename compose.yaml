services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: auction
      POSTGRES_USER: auction
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD for local development}
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auction -d auction"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - auction-postgres:/var/lib/postgresql/data

volumes:
  auction-postgres:
